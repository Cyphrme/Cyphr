{% extends "base.html" %}
{% block title %}{{ config.title }}{% endblock title %}
{% block content %}
<article class="page">
    {% if page.title %}
    <h1>{{ page.title }}</h1>
    {% endif %}
    {% if content | trim | length > 0 %}
    <div class="page-body">{{ content | safe }}</div>
    {% endif %}
</article>
{% endblock content %}
