# Algorithm diversity tests

# Test 1: ES384 account adds ES256 key
[[test]]
name      = "es384_account_adds_es256_key"
principal = ["diana_es384"]

[[test.commit]]
[[test.commit.tx]]
now    = 1700000000
signer = "diana_es384"
target = "key_a"
typ    = "cyphr.me/key/create"

[test.expected]
key_count = 2
level     = 3

