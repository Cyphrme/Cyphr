# Edge case tests for state ordering
# Per SPEC §7 (State Calculation)

# ============================================================================
# Genesis-only tests
# ============================================================================

# Test: Verify KS uses lexicographic byte sort, not string sort (SPEC §7.1)
[[test]]
name      = "key_thumbprint_sort_order"
principal = ["alice", "bob", "carol"]

[test.expected]
key_count = 3
level     = 3

# Test: Verify KS is idempotent regardless of key addition order (SPEC §7.2)
[[test]]
name      = "same_keys_different_order"
principal = ["carol", "alice", "bob"]

[test.expected]
key_count = 3
level     = 3

# ============================================================================
# Transaction tests
# ============================================================================

# Test: Transaction replay order affects TS (multi-step)
[[test]]
name      = "transaction_replay_order"
principal = ["alice"]

[[test.step]]
crypto.signer = "alice"
crypto.target = "bob"
pay.now       = 1700000001
pay.typ       = "cyphr.me/key/create"

[[test.step]]
crypto.signer = "alice"
crypto.target = "carol"
pay.now       = 1700000002
pay.typ       = "cyphr.me/key/create"

[test.expected]
key_count = 3

# ============================================================================
# Combined transaction + action tests
# ============================================================================

# Test: Transaction followed by action (SPEC §7.4, §7.5)
# Verifies combined state after key/create + action signed by newly added key
[[test]]
name      = "action_after_key_add"
principal = ["alice"]

[test.pay]
now = 1700000001
typ = "cyphr.me/key/create"

[test.crypto]
signer = "alice"
target = "bob"

[test.action]
msg    = "Action signed by newly added key"
now    = 1700000002
signer = "bob"
typ    = "cyphr.me/action"

[test.expected]
key_count = 2
level     = 4
