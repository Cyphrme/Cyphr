# State Computation Test Vectors
# Per SPEC §7 - tests for KS, TS, AS, PS computation

# ============================================================================
# Genesis-only tests (verify initial state after principal creation)
# ============================================================================

# KS = tmb for single key (no hash, direct promotion per SPEC §7.1)
[[test]]
name      = "ks_single_key_promotion"
principal = ["golden"]

[test.expected]
key_count = 1
level     = 1

# KS = H(sort(tmb₀, tmb₁)) for multi-key via genesis transactions (SPEC §7.1)
[[test]]
name      = "ks_two_keys_sorted"
principal = ["golden"]           # Start with single implicit key

[[test.step]]
[test.step.pay]
now = 1700000001
typ = "cyphr.me/key/create"

[test.step.crypto]
signer = "golden"
target = "key_a"

[[test.step]]
[test.step.pay]
commit = true
now    = 1700000002
typ    = "cyphr.me/principal/create"

[test.step.crypto]
signer = "golden"

[test.expected]
key_count = 2
level     = 3

# AS = KS when no transactions exist (SPEC §7.3)
[[test]]
name      = "as_only_ks_promotion"
principal = ["golden"]

[test.expected]
key_count = 1
level     = 1

# PS = AS when no data state exists (SPEC §7.4)
[[test]]
name      = "ps_only_as_promotion"
principal = ["golden"]

[test.expected]
key_count = 1
level     = 1

# Genesis with ES384 key (SHA-384, 48-byte digests)
[[test]]
name      = "implicit_genesis_es384"
principal = ["diana_es384"]

[test.expected]
key_count = 1
level     = 1

# Genesis with Ed25519 key (SHA-512, 64-byte digests)
[[test]]
name      = "implicit_genesis_ed25519"
principal = ["eve_ed25519"]

[test.expected]
key_count = 1
level     = 1

# ============================================================================
# Transaction-based tests
# ============================================================================

# TS = czd for single transaction (no hash, direct promotion per SPEC §7.2)
[[test]]
name      = "ts_single_tx_promotion"
principal = ["golden"]

[test.pay]
now = 1700000000
typ = "cyphr.me/key/create"

[test.crypto]
signer = "golden"
target = "key_a"

[test.expected]
key_count = 2
level     = 3

# TS = H(sort(czd₀, czd₁)) for multiple transactions (SPEC §7.2)
[[test]]
name      = "ts_multi_tx_sorted"
principal = ["golden"]

[[test.step]]
crypto.signer = "golden"
crypto.target = "key_a"
pay.now       = 1700000001
pay.typ       = "cyphr.me/key/create"

[[test.step]]
crypto.signer = "golden"
crypto.target = "key_a"
pay.now       = 1700000002
pay.typ       = "cyphr.me/key/delete"

[test.expected]
key_count = 1
level     = 3

# AS = H(sort(KS, TS)) when transactions exist (SPEC §7.3)
[[test]]
name      = "as_ks_ts_combined"
principal = ["golden"]

[test.pay]
now = 1700000000
typ = "cyphr.me/key/create"

[test.crypto]
signer = "golden"
target = "key_a"

[test.expected]
key_count = 2
level     = 3
