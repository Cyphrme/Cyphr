# State Computation Test Vectors
# Per SPEC §8 - tests for KS, CommitID, AS, CS, PS computation

# ============================================================================
# Genesis-only tests (verify initial state after principal creation)
# ============================================================================

# KS = tmb for single key (no hash, direct promotion per SPEC §8.1)
[[test]]
name      = "ks_single_key_promotion"
principal = ["golden"]

[test.expected]
key_count = 1
level     = 1

# KS = H(sort(tmb₀, tmb₁)) for multi-key via genesis transactions (SPEC §8.1)
[[test]]
name      = "ks_two_keys_sorted"
principal = ["golden"]           # Start with single implicit key

[[test.commit]]
tx = [
  [
    { now = 1700000001, signer = "golden", target = "key_a", typ = "cyphr.me/cyphr/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000002, signer = "golden", typ = "cyphr.me/cyphr/principal/create" },
  ],
]

[test.expected]
key_count = 2
level     = 3

# AS = KS when no transactions exist (SPEC §8.3)
[[test]]
name      = "as_only_ks_promotion"
principal = ["golden"]

[test.expected]
key_count = 1
level     = 1

# PS = AS when no data state exists (SPEC §8.4)
[[test]]
name      = "ps_only_as_promotion"
principal = ["golden"]

[test.expected]
key_count = 1
level     = 1

# Genesis with ES384 key (SHA-384, 48-byte digests)
[[test]]
name      = "implicit_genesis_es384"
principal = ["diana_es384"]

[test.expected]
key_count = 1
level     = 1

# Genesis with Ed25519 key (SHA-512, 64-byte digests)
[[test]]
name      = "implicit_genesis_ed25519"
principal = ["eve_ed25519"]

[test.expected]
key_count = 1
level     = 1

# ============================================================================
# Transaction-based tests
# ============================================================================

# CommitID = czd for single transaction (no hash, direct promotion per SPEC §8.2)
[[test]]
name      = "ts_single_tx_promotion"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "key_a", typ = "cyphr.me/cyphr/key/create" },
  ],
]

[test.expected]
key_count = 2
level     = 3

# CommitID = H(sort(czd₀, czd₁)) for multiple transactions (SPEC §8.2)
[[test]]
name      = "ts_multi_tx_sorted"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000001, signer = "golden", target = "key_a", typ = "cyphr.me/cyphr/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000002, signer = "golden", target = "key_a", typ = "cyphr.me/cyphr/key/delete" },
  ],
]

[test.expected]
key_count = 1
level     = 3

# AS = H(sort(KS, CommitID)) when transactions exist (SPEC §8.3)
[[test]]
name      = "as_ks_ts_combined"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "key_a", typ = "cyphr.me/cyphr/key/create" },
  ],
]

[test.expected]
key_count = 2
level     = 3
