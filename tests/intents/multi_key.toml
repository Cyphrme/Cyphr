# Multi-key transaction tests

# Test 1: Add third key to dual-key account
[[test]]
name      = "add_third_key_to_dual_key_account"
principal = ["alice", "bob"]

[test.pay]
now = 1700000000
typ = "cyphr.me/key/add"

[test.crypto]
signer = "alice"
target = "carol"

[test.expected]
key_count = 3
level     = 3

# Test 2: Replace one of two keys
[[test]]
name      = "replace_one_of_two_keys"
principal = ["alice", "bob"]

[test.pay]
now = 1700000000
typ = "cyphr.me/key/replace"

[test.crypto]
signer = "alice"
target = "carol"

[test.expected]
key_count = 2
level     = 3

# Test 3: Non-signer (bob) adds a key
[[test]]
name      = "non_signer_adds_key"
principal = ["alice", "bob"]

[test.pay]
now = 1700000000
typ = "cyphr.me/key/add"

[test.crypto]
signer = "bob"
target = "carol"

[test.expected]
key_count = 3
level     = 3

# Test 4: Delete from triple-key leaves two
[[test]]
name      = "delete_from_triple_key_leaves_two"
principal = ["alice", "bob", "carol"]

[test.pay]
now = 1700000000
typ = "cyphr.me/key/delete"

[test.crypto]
signer = "alice"
target = "bob"

[test.expected]
key_count = 2
level     = 3
