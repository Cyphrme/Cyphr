# Error Condition Test Vectors
# Per SPEC §14 - tests for error conditions

# ============================================================================
# Unsupported algorithm test (genesis-only error)
# ============================================================================

# Genesis with unsupported algorithm fails during principal creation
[[test]]
name      = "unsupported_algorithm_fails"
principal = ["unsupported_key"]

[test.expected]
error = "UnsupportedAlgorithm"

# ============================================================================
# Revoked key tests
# Need setup.revoke_key to pre-revoke a key before the test
# ============================================================================

# Transaction signed by pre-revoked key fails with KeyRevoked
[[test]]
name      = "revoked_key_fails"
principal = ["golden", "key_a"]

[test.setup]
revoke_at  = 1699999999
revoke_key = "key_a"

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "key_a", target = "golden", typ = "cyphr.me/key/delete" },
  ],
]

[test.expected]
error = "KeyRevoked"

# Action signed by pre-revoked key fails with KeyRevoked
[[test]]
name      = "action_revoked_key_fails"
principal = ["golden", "key_a"]

[test.setup]
revoke_at  = 1699999999
revoke_key = "key_a"

[[test.action]]
msg    = "Action from revoked key"
now    = 1700000001
signer = "key_a"
typ    = "cyphr.me/action"

[test.expected]
error = "KeyRevoked"

# ============================================================================
# Last key revoke guard (Level 1 protection)
# Self-revoke of last key fails with NoActiveKeys
# ============================================================================

[[test]]
name      = "last_key_revoke_fails"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, rvk = 1700000000, signer = "golden", typ = "cyphr.me/key/revoke" },
  ],
]

[test.expected]
error = "NoActiveKeys"

# ============================================================================
# Duplicate key test
# Adding key already in KS fails with DuplicateKey
# ============================================================================

[[test]]
name      = "duplicate_key_fails"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "golden", typ = "cyphr.me/key/create" },
  ],
]

[test.expected]
error = "DuplicateKey"

# ============================================================================
# Unknown key test (signer not in principal)
# ============================================================================

[[test]]
name      = "unknown_key_fails"
principal = ["golden"]          # Only golden in principal

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "key_a", target = "key_b", typ = "cyphr.me/key/create" },
  ],
]

[test.expected]
error = "UnknownKey"

# Action signed by unknown key fails with UnknownKey
[[test]]
name      = "action_unknown_signer_fails"
principal = ["golden"]                    # Only golden in principal

[[test.action]]
msg    = "Action from unknown key"
now    = 1700000001
signer = "key_a"                   # key_a is NOT in principal
typ    = "cyphr.me/action"

[test.expected]
error = "UnknownKey"

# ============================================================================
# InvalidPrior test (wrong pre value)
# ============================================================================

[[test]]
name      = "pre_mismatch_fails"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

# Override pre with wrong value (must be valid alg:digest format to test InvalidPrior)
[test.override]
pre = "SHA-256:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"

[test.expected]
error = "InvalidPrior"

# ============================================================================
# Timestamp past tests (multi-commit, error on commit 2)
# ============================================================================

[[test]]
name      = "timestamp_past_fails"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000100, signer = "golden", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000050, signer = "golden", target = "key_b", typ = "cyphr.me/key/create" },
  ],
]

[test.expected]
error = "TimestampPast"

# Action timestamp past (multi-action, error on action 2)
[[test]]
name      = "action_timestamp_past_fails"
principal = ["golden"]

[[test.action]]
msg    = "First action"
now    = 1700000100
signer = "golden"
typ    = "cyphr.me/action"

[[test.action]]
msg    = "Second action with older timestamp"
now    = 1700000050                           # Earlier than action 1!
signer = "golden"
typ    = "cyphr.me/action"

[test.expected]
error = "TimestampPast"

# ============================================================================
# Constraint-driven tests (from coverage audit)
# ============================================================================

# [no-revoke-non-self]: Revoke MUST be self-signed — signer must match target.
# Here alice tries to revoke bob. Spec says MUST reject.
[[test]]
name      = "revoke_non_self_fails"
principal = ["alice", "bob"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, rvk = 1700000000, signer = "alice", target = "bob", typ = "cyphr.me/key/revoke" },
  ],
]

[test.expected]
error = "[no-revoke-non-self]"

# key/delete of last remaining key should fail with NoActiveKeys
# (distinct from revoke — tests the delete path specifically)
[[test]]
name      = "delete_last_key_fails"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "golden", typ = "cyphr.me/key/delete" },
  ],
]

[test.expected]
error = "NoActiveKeys"

# key/delete of unknown key (key not in principal)
[[test]]
name      = "delete_unknown_key_fails"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "key_a", typ = "cyphr.me/key/delete" },
  ],
]

[test.expected]
error = "UnknownSigner"
