# E2E Error Condition Tests
#
# These tests verify that invalid entries are rejected with correct errors.
# Each test generates entries at runtime and expects load_principal to fail.

# Broken chain: pre field doesn't match current CS
[[test]]
name      = "err_broken_chain"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

[test.override]
pre = "SHA-256:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"

[test.expected]
error = "[commit-pre-chain]"

# Unknown signer: signer key not in genesis
[[test]]
name      = "err_unknown_signer"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "alice", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

[test.expected]
error = "UnknownSigner"

# Timestamp past: timestamp older than previous commit
[[test]]
name      = "err_timestamp_past"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000002, signer = "golden", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000001, signer = "golden", target = "key_b", typ = "cyphr.me/key/create" },
  ],
]

[test.expected]
error = "[verification-timestamp-order]"

# Duplicate key: adding a key that already exists
[[test]]
name      = "err_duplicate_key"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000001, signer = "golden", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000002, signer = "golden", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

[test.expected]
error = "[create-uniqueness]"

# Revoked signer: signer key has been revoked (self-revoke), then tries to sign
[[test]]
name      = "err_revoked_signer"
principal = ["alice", "bob"]

[[test.commit]]
tx = [
  [
    { now = 1700000001, rvk = 1700000001, signer = "alice", target = "alice", typ = "cyphr.me/key/revoke" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000002, signer = "alice", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

[test.expected]
error = "KeyRevoked"

# No genesis keys: empty principal (should fail at genesis)
[[test]]
name      = "err_no_genesis_keys"
principal = []

[test.expected]
error = "NoGenesisKeys"

# ============================================================================
# Constraint-driven tests (from coverage audit)
# ============================================================================

# [no-revoke-non-self]: Alice tries to revoke Bob. Spec says MUST reject.
[[test]]
name      = "err_revoke_non_self"
principal = ["alice", "bob"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, rvk = 1700000000, signer = "alice", target = "bob", typ = "cyphr.me/key/revoke" },
  ],
]

[test.expected]
error = "[no-revoke-non-self]"

# key/delete of last remaining key
[[test]]
name      = "err_delete_last_key"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "golden", typ = "cyphr.me/key/delete" },
  ],
]

[test.expected]
error = "[naked-revoke-error]"

# key/delete of unknown key
[[test]]
name      = "err_delete_unknown_key"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "key_a", typ = "cyphr.me/key/delete" },
  ],
]

[test.expected]
error = "UnknownSigner"

# [transaction-pre-required]: Missing pre field in non-genesis transaction
[[test]]
name      = "err_transaction_missing_pre"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000001, signer = "golden", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

[test.override]
omit_pre = true

[test.expected]
error = "[transaction-pre-required]"

# [data-action-no-pre]: Data action cozies MUST NOT contain pre.
[[test]]
name      = "err_data_action_with_pre"
principal = ["golden"]

[[test.action]]
now    = 1700000001
signer = "golden"
typ    = "cyphr.me/comment/create"

[test.override]
inject_pre = true

[test.expected]
error = "[data-action-no-pre]"
