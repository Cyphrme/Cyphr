# E2E Error Condition Tests
#
# These tests verify that invalid entries are rejected with correct errors.
# Each test generates entries at runtime and expects load_principal to fail.

# Broken chain: pre field doesn't match current CS
[[test]]
name      = "err_broken_chain"
principal = ["golden"]

[[test.commit]]
[[test.commit.tx]]
now    = 1700000000
signer = "golden"
target = "key_a"
typ    = "cyphr.me/key/create"

[test.override]
pre = "SHA-256:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"

[test.expected]
error = "BrokenChain"

# Unknown signer: signer key not in genesis
[[test]]
name      = "err_unknown_signer"
principal = ["golden"]

[[test.commit]]
[[test.commit.tx]]
now    = 1700000000
signer = "alice"
target = "key_a"
typ    = "cyphr.me/key/create"

[test.expected]
error = "UnknownSigner"

# Timestamp past: timestamp older than previous commit
[[test]]
name      = "err_timestamp_past"
principal = ["golden"]

[[test.commit]]
[[test.commit.tx]]
now    = 1700000002
signer = "golden"
target = "key_a"
typ    = "cyphr.me/key/create"

[[test.commit]]
[[test.commit.tx]]
now    = 1700000001
signer = "golden"
target = "key_b"
typ    = "cyphr.me/key/create"

[test.expected]
error = "TimestampPast"

# Duplicate key: adding a key that already exists
[[test]]
name      = "err_duplicate_key"
principal = ["golden"]

[[test.commit]]
[[test.commit.tx]]
now    = 1700000001
signer = "golden"
target = "key_a"
typ    = "cyphr.me/key/create"

[[test.commit]]
[[test.commit.tx]]
now    = 1700000002
signer = "golden"
target = "key_a"
typ    = "cyphr.me/key/create"

[test.expected]
error = "DuplicateKey"

# Revoked signer: signer key has been revoked (self-revoke), then tries to sign
[[test]]
name      = "err_revoked_signer"
principal = ["alice", "bob"]

[[test.commit]]
[[test.commit.tx]]
now    = 1700000001
rvk    = 1700000001
signer = "alice"               # self-revoke: alice revokes herself
target = "alice"
typ    = "cyphr.me/key/revoke"

[[test.commit]]
[[test.commit.tx]]
now    = 1700000002
signer = "alice"
target = "key_a"
typ    = "cyphr.me/key/create"

[test.expected]
error = "KeyRevoked"

# No genesis keys: empty principal (should fail at genesis)
[[test]]
name      = "err_no_genesis_keys"
principal = []

[test.expected]
error = "NoGenesisKeys"
