# E2E Genesis/Checkpoint Load Tests
#
# These tests verify load_principal correctness by checking final state.
# Tests verify PR, AS, KS match expected values after loading.

# Implicit genesis: single key, PR = tmb
[[test]]
name      = "load_implicit_genesis"
principal = ["golden"]

[test.expected]
key_count = 1
level     = 1
# PR should equal the genesis key thumbprint for implicit genesis

# Explicit genesis: single implicit key + key/create + principal/create
# Per SPEC §5.1: implicit first key model
[[test]]
name      = "load_explicit_genesis"
principal = ["alice"]               # Start with single implicit key

[[test.commit]]
[[test.commit.tx]]
now    = 1700000001
signer = "alice"
target = "bob"
typ    = "cyphr.me/key/create"

[[test.commit]]
[[test.commit.tx]]
now    = 1700000002
signer = "alice"
typ    = "cyphr.me/principal/create"

[test.expected]
key_count = 2
level     = 3
# PR should equal hash of sorted key thumbprints

# Load with transactions: genesis + key add
[[test]]
name      = "load_with_transactions"
principal = ["golden"]

[[test.commit]]
[[test.commit.tx]]
now    = 1700000000
signer = "golden"
target = "key_a"
typ    = "cyphr.me/key/create"

[test.expected]
key_count = 2
level     = 3

# Load with actions: genesis + action
[[test]]
name      = "load_with_actions"
principal = ["golden"]

[[test.action]]
msg    = "Test action for load verification"
now    = 1700000000
signer = "golden"
typ    = "cyphr.me/action"

[test.expected]
key_count = 1
level     = 4
