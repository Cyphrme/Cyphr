# E2E Edge Case Tests
#
# These tests verify unusual but valid protocol scenarios.
# Cross-implementation reusable.

# Algorithm diversity: mixed ES256/ES384 keys in genesis
[[test]]
name      = "edge_algorithm_diversity"
principal = ["alice", "bob"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "alice", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

[test.expected]
key_count = 3
level     = 3

# Large history: 10+ sequential transactions using available keys
# Uses add/revoke cycles with key_a and key_b
[[test]]
name      = "edge_large_history"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000001, signer = "golden", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

# Step 2 removed - was causing multi-algorithm state issues
# Now using only ES256 keys for this test

[[test.commit]]
tx = [
  [
    { now = 1700000003, rvk = 1700000003, signer = "key_a", target = "key_a", typ = "cyphr.me/key/revoke" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000005, signer = "golden", target = "alice", typ = "cyphr.me/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000006, signer = "golden", target = "bob", typ = "cyphr.me/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000007, signer = "golden", target = "carol", typ = "cyphr.me/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000008, rvk = 1700000008, signer = "alice", target = "alice", typ = "cyphr.me/key/revoke" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000009, rvk = 1700000009, signer = "bob", target = "bob", typ = "cyphr.me/key/revoke" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000010, rvk = 1700000010, signer = "carol", target = "carol", typ = "cyphr.me/key/revoke" },
  ],
]

[test.expected]
key_count = 1
level     = 3

# Action-only: Level 4 account with no transactions
[[test]]
name      = "edge_action_only_no_tx"
principal = ["golden"]

[[test.action]]
msg    = "First action"
now    = 1700000001
signer = "golden"
typ    = "cyphr.me/action"

[[test.action]]
msg    = "Second action"
now    = 1700000002
signer = "golden"
typ    = "cyphr.me/action"

[[test.action]]
msg    = "Third action"
now    = 1700000003
signer = "golden"
typ    = "cyphr.me/action"

[test.expected]
key_count = 1
level     = 4

# Same timestamp: multiple commits at identical timestamp
# Per spec, this is allowed as long as chain is valid
[[test]]
name      = "edge_same_timestamp"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "key_a", typ = "cyphr.me/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "key_b", typ = "cyphr.me/key/create" },
  ],
]

[test.expected]
key_count = 3
level     = 3
