# E2E Round-Trip Tests
#
# These tests verify generate → export → import → compare.
# Unlike integration tests, these are NOT pre-generated to golden files.
# The test runner generates dynamically at test time.

# Basic single-step round-trip
[[test]]
name      = "e2e_key_add"
principal = ["golden"]

[test.pay]
now = 1700000000
typ = "cyphr.me/key/create"

[test.crypto]
signer = "golden"
target = "key_a"

[test.expected]
key_count = 2
level     = 3

# Multi-step transaction round-trip
[[test]]
name      = "e2e_multi_tx"
principal = ["golden"]

[[test.step]]
[test.step.pay]
now = 1700000001
typ = "cyphr.me/key/create"

[test.step.crypto]
signer = "golden"
target = "key_a"

[[test.step]]
[test.step.pay]
now = 1700000002
typ = "cyphr.me/key/create"

[test.step.crypto]
signer = "golden"
target = "key_b"

[test.expected]
key_count = 3
level     = 3

# Action round-trip (Level 4)
[[test]]
name      = "e2e_single_action"
principal = ["golden"]

[test.action]
msg    = "E2E test action"
now    = 1700000000
signer = "golden"
typ    = "cyphr.me/action"

[test.expected]
key_count = 1
level     = 4

# Multi-key genesis round-trip (explicit genesis via transactions)
# Per SPEC §5.1: implicit first key + key/create + principal/create
[[test]]
name      = "rt_multi_key_genesis"
principal = ["alice"]              # Start with single implicit key

[[test.step]]
[test.step.pay]
now = 1700000001
typ = "cyphr.me/key/create"

[test.step.crypto]
signer = "alice"
target = "bob"

[[test.step]]
[test.step.pay]
commit = true
now    = 1700000002
typ    = "cyphr.me/principal/create"

[test.step.crypto]
signer = "alice"

[[test.step]]
[test.step.pay]
now = 1700000003
typ = "cyphr.me/key/create"

[test.step.crypto]
signer = "alice"
target = "key_a"

[test.expected]
key_count = 3
level     = 3

# Key revoke cycle round-trip (add key, then revoke it)
[[test]]
name      = "rt_key_revoke_cycle"
principal = ["golden"]

[[test.step]]
[test.step.pay]
now = 1700000001
typ = "cyphr.me/key/create"

[test.step.crypto]
signer = "golden"
target = "key_a"

[[test.step]]
[test.step.pay]
now = 1700000002
rvk = 1700000002
typ = "cyphr.me/key/revoke"

[test.step.crypto]
signer = "golden"
target = "key_a"

[test.expected]
key_count = 1
level     = 3
