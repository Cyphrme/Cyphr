# E2E Round-Trip Tests
#
# These tests verify generate → export → import → compare.
# Unlike integration tests, these are NOT pre-generated to golden files.
# The test runner generates dynamically at test time.

# Basic single-commit round-trip
[[test]]
name      = "e2e_key_add"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000000, signer = "golden", target = "key_a", typ = "cyphr.me/cyphr/key/create" },
  ],
]

[test.expected]
key_count = 2
level     = 3

# Multi-commit transaction round-trip
[[test]]
name      = "e2e_multi_tx"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000001, signer = "golden", target = "key_a", typ = "cyphr.me/cyphr/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000002, signer = "golden", target = "key_b", typ = "cyphr.me/cyphr/key/create" },
  ],
]

[test.expected]
key_count = 3
level     = 3

# Action round-trip (Level 4)
[[test]]
name      = "e2e_single_action"
principal = ["golden"]

[[test.action]]
msg    = "E2E test action"
now    = 1700000000
signer = "golden"
typ    = "cyphr.me/action"

[test.expected]
key_count = 1
level     = 4

# Multi-key genesis round-trip (explicit genesis via transactions)
# Per SPEC §5.1: implicit first key + key/create + principal/create
[[test]]
name      = "rt_multi_key_genesis"
principal = ["alice"]              # Start with single implicit key

[[test.commit]]
tx = [
  [
    { now = 1700000001, signer = "alice", target = "bob", typ = "cyphr.me/cyphr/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000002, signer = "alice", typ = "cyphr.me/cyphr/principal/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000003, signer = "alice", target = "key_a", typ = "cyphr.me/cyphr/key/create" },
  ],
]

[test.expected]
key_count = 3
level     = 3

# Key revoke cycle round-trip (add key, then revoke it)
[[test]]
name      = "rt_key_revoke_cycle"
principal = ["golden"]

[[test.commit]]
tx = [
  [
    { now = 1700000001, signer = "golden", target = "key_a", typ = "cyphr.me/cyphr/key/create" },
  ],
]

[[test.commit]]
tx = [
  [
    { now = 1700000002, rvk = 1700000002, signer = "key_a", typ = "cyphr.me/cyphr/key/revoke" },
  ],
]

[test.expected]
key_count = 1
level     = 3
